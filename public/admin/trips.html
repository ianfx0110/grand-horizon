<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Logistics | Admin</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/svg+xml" href="/logo.svg">
</head>
<body>
    <div class="app-wrapper">
        <nav class="nav-container">
            <div class="logo">
                <a href="/">
                    <img src="/logo.svg" alt="Grand Horizon Logo">
                    <span>Grand Horizon</span>
                </a>
            </div>
            <button class="menu-toggle" id="menu-btn">☰</button>
            <div class="nav-links" id="nav-content">
                <!-- Dynamic Nav -->
            </div>
        </nav>

        <main>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem;">
                <h2 style="color: var(--gold); font-family: var(--font-serif); margin: 0;">Elite Departure Logistics</h2>
                <a href="/admin/new-trip.html" class="btn-primary">Schedule New Deployment</a>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Trip ID</th>
                            <th>Route</th>
                            <th>Vehicle</th>
                            <th>Driver</th>
                            <th>Departure</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="trips-list">
                        <tr>
                            <td colspan="6" style="text-align: center;">Scanning flight logs...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="/nav.js"></script>
    <script>
        async function loadTrips() {
            try {
                const res = await fetch('/api/trips');
                if (!res.ok) return;
                const trips = await res.json();
                const tbody = document.getElementById('trips-list');

                if (trips.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No scheduled departures indexed.</td></tr>';
                    return;
                }

                tbody.innerHTML = trips.map(t => `
                    <tr>
                        <td style="color: var(--gold);">#${t.trip_id}</td>
                        <td style="font-weight: 600;">${t.origin} to ${t.destination}</td>
                        <td>${t.model} (${t.number_plate})</td>
                        <td>${t.first_name} ${t.last_name}</td>
                        <td>${new Date(t.departure_time).toLocaleString()}</td>
                        <td><span style="font-size: 0.75rem; border: 1px solid var(--gold); padding: 0.2rem 0.6rem; border-radius: 4px;">${t.status.toUpperCase()}</span></td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }
        loadTrips();
    </script>
</body>
</html>
