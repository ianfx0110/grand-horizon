<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Deployment | Admin</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/svg+xml" href="/logo.svg">
</head>
<body>
    <div class="app-wrapper">
        <nav class="nav-container">
            <div class="logo">
                <a href="/">
                    <img src="/logo.svg" alt="Grand Horizon Logo">
                    <span>Grand Horizon</span>
                </a>
            </div>
            <button class="menu-toggle" id="menu-btn">☰</button>
            <div class="nav-links" id="nav-content">
                <!-- Dynamic Nav -->
            </div>
        </nav>

        <main>
            <div class="form-card">
                <h2 style="color: var(--gold); font-family: var(--font-serif); text-align: center; margin-bottom: 2rem;">Schedule Elite Deployment</h2>
                <form id="new-trip-form">
                    <div class="form-group">
                        <label>Target Route</label>
                        <select name="route_id" id="route-select" required>
                            <option value="">Fetching active routes...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Assigned Vehicle (License Plate)</label>
                        <input type="text" name="number_plate" placeholder="e.g. KDA 123G" required>
                    </div>
                    <div class="form-group">
                        <label>Assigned Pilot (Driver ID)</label>
                        <input type="number" name="driver_id" placeholder="1" required>
                    </div>
                    <div class="form-group">
                        <label>Departure Timestamp</label>
                        <input type="datetime-local" name="departure_time" required>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%;">Confirm Deployment</button>
                    <p id="form-feedback" style="text-align: center; margin-top: 1rem; font-size: 0.8rem; display: none;"></p>
                </form>
            </div>
        </main>
    </div>

    <script src="/nav.js"></script>
    <script>
        async function loadRoutes() {
            try {
                const res = await fetch('/api/routes');
                const routes = await res.json();
                const select = document.getElementById('route-select');
                select.innerHTML = '<option value="" disabled selected>Select destination route</option>';
                select.innerHTML += routes.map(r => `<option value="${r.route_id}">${r.origin} to ${r.destination} (KES ${Math.round(r.base_price)})</option>`).join('');
            } catch (err) {
                console.error(err);
            }
        }

        document.getElementById('new-trip-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const data = Object.fromEntries(fd.entries());
            const feedback = document.getElementById('form-feedback');

            try {
                const res = await fetch('/api/admin/trips', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    feedback.textContent = 'Deployment scheduled successfully.';
                    feedback.style.color = 'var(--gold)';
                    feedback.style.display = 'block';
                    setTimeout(() => window.location.href = '/admin/trips.html', 1500);
                } else {
                    const err = await res.json();
                    feedback.textContent = 'Operation failed: ' + (err.error || 'Check inputs');
                    feedback.style.color = '#ff4d4d';
                    feedback.style.display = 'block';
                }
            } catch (err) {
                console.error(err);
            }
        });

        loadRoutes();
    </script>
</body>
</html>
