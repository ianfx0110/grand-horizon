<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="horizonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background Sun/Disk -->
  <circle cx="50" cy="45" r="30" fill="url(#horizonGrad)" opacity="0.2" />
  <!-- Horizon Line -->
  <path d="M10 70 L90 70" stroke="#d4af37" stroke-width="2" />
  <!-- Stylized Mountain Peak (Rift Valley / Mt. Kenya) -->
  <path d="M25 70 L50 30 L75 70 Z" fill="none" stroke="#d4af37" stroke-width="2" />
  <!-- Accent Line -->
  <path d="M45 50 L55 50" stroke="#d4af37" stroke-width="1" />
</svg>
