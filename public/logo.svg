<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Minimalist Horizon Logo -->
  
  <!-- The Horizon line -->
  <line x1="20" y1="65" x2="80" y2="65" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Stylized Sun (Grand Sun) -->
  <path d="M35 65C35 56.7157 41.7157 50 50 50C58.2843 50 65 56.7157 65 65" 
        stroke="#D4AF37" stroke-width="4" stroke-linecap="round"/>
        
  <!-- Radiant Rays -->
  <path d="M50 35V42M38 42L42 46M62 42L58 46M28 65H32M68 65H72" 
        stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Reflected ripples below the horizon -->
  <path d="M40 72H60M45 78H55" stroke="#D4AF37" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  
  <!-- Outer Ring (Optional for elegance) -->
  <circle cx="50" cy="50" r="45" stroke="#D4AF37" stroke-width="0.5" stroke-dasharray="1 3" opacity="0.3"/>
</svg>
