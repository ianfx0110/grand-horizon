<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Access | Grand Horizon</title>
    <link rel="stylesheet" href="/public/style.css">
    <link rel="icon" type="image/svg+xml" href="/public/logo.svg">
</head>
<body>
    <div class="app-wrapper">
        <nav class="nav-container">
            <div class="logo">
                <a href="/">
                    <img src="/public/logo.svg" alt="Grand Horizon Logo">
                    <span>Grand Horizon</span>
                </a>
            </div>
            <button class="menu-toggle" id="menu-btn">☰</button>
            <div class="nav-links" id="nav-content">
                <!-- Links dynamically loaded by nav.js -->
            </div>
        </nav>

        <main style="display: flex; justify-content: center; align-items: center; min-height: calc(100vh - var(--top-nav-height));">
            <div class="form-card" style="width: 100%; max-width: 450px;">
                <h2 style="text-align: center; color: var(--gold); margin-bottom: 2rem; font-family: var(--font-serif);">Hotel Command Center</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label>Registry Username</label>
                        <input type="text" id="username" placeholder="e.g. john.doe" required>
                    </div>
                    <div class="form-group">
                        <label>Credential Key</label>
                        <div style="position: relative;">
                            <input type="password" id="password" placeholder="123456" required>
                            <button type="button" id="toggle-password" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--gold); cursor: pointer; font-size: 0.8rem;">Show</button>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%;">Establish Connection</button>
                </form>
                <p id="error-msg" style="color: #ff4d4d; text-align: center; margin-top: 1rem; font-size: 0.85rem; display: none;"></p>
            </div>
        </main>
    </div>

    <script src="/public/nav.js"></script>
    <script>
        const passInput = document.getElementById('password');
        const passToggle = document.getElementById('toggle-password');

        passToggle.addEventListener('click', () => {
            const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passInput.setAttribute('type', type);
            passToggle.textContent = type === 'password' ? 'Show' : 'Hide';
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-msg');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (res.ok) {
                    window.location.href = '/public/staff/dashboard.html';
                } else {
                    const data = await res.json();
                    errorEl.textContent = data.error || 'Authentication failed';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'Network error. Try again.';
                errorEl.style.display = 'block';
            }
        });

        // Check if already logged in
        async function checkSession() {
            const res = await fetch('/api/me');
            if (res.ok) window.location.href = '/public/staff/dashboard.html';
        }
        checkSession();
    </script>
</body>
</html>
